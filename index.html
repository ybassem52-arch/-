<script>
    let list = JSON.parse(localStorage.getItem('mama_mall_v6')) || [];
    let myLimit = localStorage.getItem('limit_mall_v6') || 0;

    function searchMenu() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let options = document.getElementById("itemSelect").options;
        for (let i = 0; i < options.length; i++) {
            let txt = options[i].text || options[i].innerText;
            options[i].style.display = txt.toUpperCase().indexOf(input) > -1 ? "" : "none";
        }
    }

    function render() {
        const hist = document.getElementById('historyList');
        const spent = document.getElementById('spent');
        const rem = document.getElementById('rem');
        hist.innerHTML = '';
        let total = 0;
        list.slice().reverse().forEach(x => {
            total += x.a;
            hist.innerHTML += `<div class="item"><span>${x.c}</span><b>${x.a} ج.م</b></div>`;
        });
        spent.innerText = total + " ج.م";
        rem.innerText = (myLimit - total) + ' ج.م';
        rem.style.color = (myLimit - total) < 0 ? "#dc2626" : "#15803d";
        localStorage.setItem('mama_mall_v6', JSON.stringify(list));
        localStorage.setItem('limit_mall_v6', myLimit);
    }

    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        const c = document.getElementById('itemSelect').value;
        const a = parseFloat(document.getElementById('price').value);
        if(!c) return alert("اختاري الصنف الأول!");
        list.push({ c, a });
        document.getElementById('price').value = '';
        render();
    };

    document.getElementById('limit').oninput = (e) => {
        myLimit = e.target.value;
        render()

    }

    document.getElementById('limit').value = myLimit;
    render();
  function changeLang() {
    const lang = document.getElementById('langSwitch').value;
    const title = document.getElementById('appTitle');
    const sub = document.getElementById('subTitle');
    const addBtn = document.querySelector('.add-btn');
    const waBtn = document.querySelector('.wa-btn');

    if (lang === 'en') {
        document.body.dir = 'ltr';
        title.innerText = "Moneto - Smart Budget";
        sub.innerText = "Developed by Yousef 🚀";
        addBtn.innerText = "Add Expense ➕";
        document.getElementById('searchInput').placeholder = "🔍 Search (Tea, Fish, Sugar...)";
        document.getElementById('price').placeholder = "Price";
        document.getElementById('limit').placeholder = "Set Budget";
    } else {
        document.body.dir = 'rtl';
        title.innerText = "مونيتو - الميزانية الذكية";
        sub.innerText = "برمجة يوسف - مبرمج الإسكندرية 🌊";
        addBtn.innerText = "إضافة للمصاريف ➕";
        document.getElementById('searchInput').placeholder = "🔍 ابحثي عن (شاي، سمك، سكر...)";
        document.getElementById('price').placeholder = "المبلغ المطلوب";
        document.getElementById('limit').placeholder = "حددي الميزانية";
    }
}
function clearAll() {
    if(confirm("هل أنتي متأكدة من مسح كل المصاريف؟")) {
        list = [];
        localStorage.removeItem('mama_mall_v6');
        render();
    }
}
