<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تطبيق ست الكل للمصاريف</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.3/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-4">
  <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6">
    <h1 class="text-2xl font-bold mb-4 text-center text-blue-600">تطبيق ست الكل للمصاريف ❤️</h1>
    
    <div class="mb-6 p-4 bg-blue-50 rounded-lg border border-blue-100 text-center">
        <label class="block text-sm text-gray-600 mb-1">حددي الميزانية الشهرية (اختياري):</label>
        <input type="number" id="budgetLimit" class="bg-transparent text-xl font-bold text-blue-700 text-center w-full outline-none" placeholder="0">
        <p class="text-xs text-gray-500 mt-2">المتبقي لكِ: <span id="remainingBudget" class="font-bold text-green-600">0</span> EGP</p>
    </div>

    <form id="expenseForm" class="mb-4">
      <div>
        <label for="expenseName" class="block text-gray-700 font-bold">نوع المصروف</label>
        <select id="expenseName" class="w-full border rounded p-2 mt-1" required>
          <option value="أكل">أكل 🍔</option>
          <option value="مواصلات">مواصلات 🚗</option>
          <option value="فواتير">فواتير ⚡</option>
          <option value="آخر">آخر 🛍️</option>
        </select>
      </div>
      <div>
        <label for="expenseAmount" class="block text-gray-700 mt-4 font-bold">المبلغ (EGP)</label>
        <input type="number" id="expenseAmount" class="w-full border rounded p-2 mt-1" placeholder="أدخل المبلغ" required>
      </div>
      <button type="submit" class="w-full mt-4 bg-blue-600 text-white rounded p-2 font-bold shadow-md hover:bg-blue-700">إضافة مصروف</button>
    </form>
    
    <div class="mt-4 border-t pt-4 text-lg flex justify-between">
      <div><strong>المجموع:</strong> <span id="totalAmount" class="text-red-600 font-bold">0</span> EGP</div>
      <div class="text-sm text-gray-500">العمليات: <span id="expenseCount">0</span></div>
    </div> 

    <div class="mt-6">
        <canvas id="expenseChart"></canvas>
    </div>

    <div class="mt-6">
      <h3 class="font-bold text-gray-700 mb-2 border-b">سجل المصاريف:</h3>
      <table class="w-full text-right text-sm">
        <thead>
          <tr class="bg-gray-50">
            <th class="p-2 border-b">النوع</th>
            <th class="p-2 border-b">الساعة</th>
            <th class="p-2 border-b text-center">المبلغ</th>
          </tr>
        </thead>
        <tbody id="expenseTableBody"></tbody>
      </table>
    </div>

    <button onclick="clearAllData()" class="w-full mt-8 text-red-400 text-xs hover:text-red-600 underline">
        مسح السجل بالكامل والبدء من جديد 🧹
    </button>
  </div> 

  <script>
    const expenseForm = document.getElementById('expenseForm');
    const budgetInput = document.getElementById('budgetLimit');
    
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
    let budgetLimit = localStorage.getItem('budgetLimit') || 0;
    let expenseChart; 

    function renderExpenses() {
      const tableBody = document.getElementById('expenseTableBody');
      const totalElement = document.getElementById('totalAmount');
      const remainingElement = document.getElementById('remainingBudget');
      
      tableBody.innerHTML = '';
      let total = 0;
      let categories = { 'أكل': 0, 'مواصلات': 0, 'فواتير': 0, 'آخر': 0 };

      expenses.slice().reverse().forEach(exp => {
        total += exp.amount;
        categories[exp.name] = (categories[exp.name] || 0) + exp.amount;
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="p-2 border-b">${exp.name}</td>
          <td class="p-2 border-b text-gray-400 text-xs">${exp.time}</td>
          <td class="p-2 border-b text-center font-bold">${exp.amount} EGP</td>`;
        tableBody.appendChild(tr);
      });

      totalElement.textContent = total;
      document.getElementById('expenseCount').textContent = expenses.length;
      budgetInput.value = budgetLimit;
      remainingElement.textContent = Math.max(0, budgetLimit - total);

      updateChart(categories);
    }

    function updateChart(categories) {
      const ctx = document.getElementById('expenseChart').getContext('2d');
      const data = {
        labels: ['أكل', 'مواصلات', 'فواتير', 'آخر'],
        datasets: [{
          data: Object.values(categories),
          backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0']
        }]
      };

      if (expenseChart) {
        expenseChart.data = data;
        expenseChart.update();
      } else {
        expenseChart = new Chart(ctx, { type: 'pie', data: data });
      }
    }

    expenseForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const amount = parseFloat(document.getElementById('expenseAmount').value);
      const newExp = {
        name: document.getElementById('expenseName').value,
        amount: amount,
        time: new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})
      };
      expenses.push(newExp);
      localStorage.setItem('expenses', JSON.stringify(expenses));
      document.getElementById('expenseAmount').value = '';
      renderExpenses();
    });

    budgetInput.addEventListener('input', (e) => {
        budgetLimit = e.target.value;
        localStorage.setItem('budgetLimit', budgetLimit);
        renderExpenses();
    });

    function clearAllData() {
        if(confirm("يا ست الكل، متأكدة إنك عايزة تمسحي كل اللي سجلناه؟")) {
            expenses = [];
            localStorage.removeItem('expenses');
            renderExpenses();
        }
    }

    window.onload = renderExpenses;
  </script>
</body>
</html>
