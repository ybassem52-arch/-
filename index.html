<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق ميزانية ست الكل</title>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #1e293b; }
        .card { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 8px solid var(--primary); }
        h1 { text-align: center; color: var(--primary); font-size: 22px; margin-bottom: 20px; }
        
        .budget-section { background: #eff6ff; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .rem-amount { font-size: 28px; font-weight: bold; color: var(--success); margin: 5px 0; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .add-btn { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; padding: 15px; border-radius: 12px; width: 100%; font-size: 18px; margin-top: 10px; }
        .add-btn:active { transform: scale(0.98); }

        .whatsapp-btn { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3); }

        .stats { display: flex; justify-content: space-between; margin-top: 20px; padding: 10px; border-bottom: 2px solid #f1f5f9; font-weight: bold; }
        .list-container { margin-top: 15px; max-height: 180px; overflow-y: auto; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 15px; background: #fff; }
        .clear-btn { background: none; color: #94a3b8; border: none; text-decoration: underline; font-size: 13px; margin-top: 20px; cursor: pointer; display: block; width: 100%; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h1>ميزانية ست الكل ❤️</h1>

    <div class="budget-section">
        <div style="font-size: 14px; color: #64748b;">الميزانية المتبقية</div>
        <div class="rem-amount" id="remDisplay">0 EGP</div>
        <input type="number" id="totalBudget" placeholder="حددي ميزانية الشهر هنا" style="text-align: center; height: 40px;">
    </div>

    <form id="expForm">
        <select id="expType">
            <option value="أكل 🍔">أكل 🍔</option>
            <option value="مواصلات 🚗">مواصلات 🚗</option>
            <option value="فواتير ⚡">فواتير ⚡</option>
            <option value="أخرى 🛍️">أخرى 🛍️</option>
        </select>
        <input type="number" id="expAmount" placeholder="المبلغ المطلوب" required>
        <button type="submit" class="add-btn">إضافة للمصاريف ➕</button>
    </form>

    <div class="stats">
        <span>المصروف: <span id="totalSpent" style="color: var(--danger);">0</span></span>
        <span style="font-size: 13px; color: #64748b;">يوسف المبرمج 😎</span>
    </div>

    <div class="list-container" id="history"></div>

    <button class="whatsapp-btn" onclick="sendWhatsApp()">
        تقرير لأبو يوسف 💌
    </button>

    <button class="clear-btn" onclick="resetAll()">تصفير السجل للبداية 🧹</button>
</div>

<script>
    let expenses = JSON.parse(localStorage.getItem('mama_app_data')) || [];
    let budget = localStorage.getItem('mama_app_limit') || 0;
    const papaPhone = "201013232884"; // رقم بابا

    function updateUI() {
        const history = document.getElementById('history');
        const spentDiv = document.getElementById('totalSpent');
        const remDiv = document.getElementById('remDisplay');
        
        history.innerHTML = '';
        let total = 0;

        expenses.slice().reverse().forEach(item => {
            total += item.amount;
            history.innerHTML += `
                <div class="item">
                    <span>${item.type} <small style="color:#94a3b8; display:block;">${item.time}</small></span>
                    <b>${item.amount} EGP</b>
                </div>`;
        });

        spentDiv.innerText = total;
        remDiv.innerText = (budget - total) + ' EGP';
        
        // تغيير اللون لو الميزانية خلصت
        remDiv.style.color = (budget - total) < 0 ? '#ef4444' : '#22c55e';

        localStorage.setItem('mama_app_data', JSON.stringify(expenses));
        localStorage.setItem('mama_app_limit', budget);
    }

    document.getElementById('expForm').onsubmit = (e) => {
        e.preventDefault();
        const type = document.getElementById('expType').value;
        const amount = parseFloat(document.getElementById('expAmount').value);
        const time = new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});

        expenses.push({ type, amount, time });
        document.getElementById('expAmount').value = '';
        updateUI();
    };

    document.getElementById('totalBudget').oninput = (e) => {
        budget = e.target.value;
        updateUI();
    };

    function sendWhatsApp() {
        if(expenses.length === 0) return alert("السجل فاضي يا ست الكل!");

        let msg = "يا أبو يوسف، ده تقرير بمصاريف البيت النهاردة: %0A";
        let total = 0;
        expenses.forEach(ex => {
            msg += `• ${ex.type}: ${ex.amount} ج.م%0A`;
            total += ex.amount;
        });
        msg += `%0A*إجمالي المصاريف: ${total} ج.م*%0Aمع كل التقدير. ❤️`;

        window.open(`https://wa.me/${papaPhone}?text=${msg}`, '_blank');
    }

    function resetAll() {
        if(confirm("تمسحي السجل وتصفي الحساب؟")) {
            expenses = [];
            updateUI();
        }
    }

    document.getElementById('totalBudget').value = budget;
    updateUI();
</script>

</body>
</html>
