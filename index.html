    <style>
        :root { --bg: #f1f5f9; --card-bg: #ffffff; --text-main: #1e3a8a; --text-sub: #64748b; --box-bg: #eff6ff; --border: #cbd5e1; }
        [data-theme="dark"] { --bg: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; --text-sub: #cbd5e1; --box-bg: #2d2d2d; --border: #444; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 10px; transition: 0.3s; }
        
        .card { max-width: 550px; margin: auto; background: var(--card-bg); padding: 20px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); border-top: 12px solid #1e3a8a; position: relative; transition: 0.5s; }
        
        /* تأثير الـ RGB المضيء */
        .rgb-border {
            border: 5px solid transparent !important;
            background-image: linear-gradient(var(--card-bg), var(--card-bg)), conic-gradient(from var(--angle), #ff0000, #00ffff, #00ff00, #ffff00, #ff0000) !important;
            background-origin: border-box !important;
            background-clip: content-box, border-box !important;
            animation: rotate-rgb 3s linear infinite !important;
        }

        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes rotate-rgb { to { --angle: 360deg; } }

        .gaming-title { color: #00ffcc !important; text-shadow: 0 0 10px #00ffcc; font-family: sans-serif; }
        
        h1 { text-align: center; color: var(--text-main); font-size: 22px; margin-bottom: 5px; transition: 0.3s; }
        .sub-title { text-align: center; color: var(--text-sub); font-size: 14px; margin-bottom: 20px; }
        .budget-box { background: var(--box-bg); padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; border: 1px solid #bfdbfe; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #22c55e; }
        input:checked + .slider:before { transform: translateX(26px); }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid var(--border); border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; background: var(--card-bg); color: var(--text-main); }
        .add-btn { background: #1e3a8a; color: white; border: none; font-weight: bold; cursor: pointer; }
        .history { margin-top: 15px; max-height: 300px; overflow-y: auto; border-top: 2px solid #e2e8f0; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    </style>
</head>

                <option value="">اختار اللي صرفته يا جيمنج 🕹️</option>
                <optgroup label="🎮 بلاي ستيشن">
                    <option value="بلاي ستيشن 3">بلاي ستيشن 3</option>
                    <option value="بلاي ستيشن 4">بلاي ستيشن 4</option>
                    <option value="بلاي ستيشن 5">بلاي ستيشن 5</option>
                </optgroup>
                <optgroup label="🍜 منيو الاندومي">
                    <option value="اندومي كوري 🔥">اندومي كوري 🔥</option>
                    <option value="اندومي خضار/لحمة">اندومي خضار/لحمة</option>
                </optgroup>
                <optgroup label="🍟 سناكس">
                    <option value="شيبسي / كرانشي">شيبسي / كرانشي</option>
                    <option value="بيبسي / كولا">بيبسي / كولا</option>
                </optgroup>`;
        } else {
            card.classList.remove('rgb-border');
            title.innerHTML = "Monito - مونيتو";
            title.classList.remove('gaming-title');
            btn.innerText = "الانتقال إلى وضع الجيمنج 🎮";
            select.innerHTML = originalMenuHTML;
        }
    }

    // دوال التشغيل الأساسية
    function render() {
        const hist = document.getElementById('historyList');
        const rem = document.getElementById('rem');
        hist.innerHTML = '';
        let total = 0;
        list.slice().reverse().forEach(x => {
            total += x.a;
            hist.innerHTML += `<div class="item"><span>${x.c}</span><b>${x.a} ج.م</b></div>`;
        });
        rem.innerText = (myLimit - total) + ' EGP';
    }

    auth.onAuthStateChanged(user => {
        const section = document.getElementById('auth-section');
        if (user) {
            currentUser = user;
            section.innerHTML = `<span>أهلاً ${user.displayName.split(' ')[0]} 👋</span> <button onclick="auth.signOut()" style="width:auto; padding:5px; font-size:10px;">خروج</button>`;
            db.collection("users").doc(user.uid).get().then(doc => {
                if (doc.exists) {
                    list = doc.data().expenses || [];
                    myLimit = doc.data().limit || 0;
                    document.getElementById('limit').value = myLimit;
                    render();
                }
            });
        } else {
            section.innerHTML = `<button onclick="auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())" style="width:auto;">دخول بجوجل 🚀</button>`;
        }
    });

    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        const c = document.getElementById('itemSelect').value;
        const a = parseFloat(document.getElementById('price').value);
        if(!c || isNaN(a)) return;
        list.push({ c, a });
        render();
        if(currentUser) db.collection("users").doc(currentUser.uid).set({ expenses: list, limit: myLimit });
    };

    function searchMenu() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let options = document.getElementById("itemSelect").options;
        for (let i = 0; i < options.length; i++) {
            let txt = options[i].text;
            options[i].style.display = txt.toUpperCase().indexOf(input) > -1 ? "" : "none";
        }
    }
</script>
</body>
</html>
