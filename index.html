<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <title>Monito - مونيتو</title>
    <style>
        :root { 
            --bg: #f4f7fe; --card-bg: #ffffff; --text-main: #1a202c; 
            --accent: #3b82f6; --secondary: #10b981; --danger: #ef4444;
        }
        [data-theme="dark"] { --bg: #1a202c; --card-bg: #2d3748; --text-main: #f7fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 20px; transition: 0.3s; }
        .card { max-width: 450px; margin: auto; background: var(--card-bg); padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 32px; color: var(--accent); margin-bottom: 2px; font-weight: 800; }
        .theme-btn { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 6px 16px; border-radius: 20px; cursor: pointer; margin-bottom: 15px; }
        .budget-container { background: var(--bg); border: 2px dashed var(--accent); border-radius: 20px; padding: 15px; margin: 20px 0; }
        #rem { font-size: 38px; font-weight: 900; color: var(--secondary); display: block; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 15px; background: var(--card-bg); color: var(--text-main); font-size: 16px; }
        .btn { border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; }
        .btn-add { background: var(--accent); color: white; margin-top: 10px; }
        .auth-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .btn-auth { font-size: 14px; padding: 12px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; }
        .history { margin-top: 25px; text-align: right; max-height: 200px; overflow-y: auto; border-top: 1px solid #eee; }
        .item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.03); }
    </style>
</head>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpwcIgEsaG_lEhC6Yp6nQ__spGj_ZqnYY",
        authDomain: "monito-c4291.firebaseapp.com",
        projectId: "monito-c4291",
        storageBucket: "monito-c4291.appspot.com",
        appId: "1:366796127553:web:a840f751c322000248b5c0"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let list = []; let myLimit = 0; let currentUser = null;

    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            const name = user.displayName ? user.displayName.split(' ')[0] : "يوسف";
            document.getElementById('auth-section').innerHTML = `أهلاً ${name} 👋 <span onclick="auth.signOut()" style="color:red; cursor:pointer; font-size:12px;">(خروج)</span>`;
            db.collection("users").doc(user.uid).get().then(doc => {
                if (doc.exists) { 
                    list = doc.data().expenses || []; 
                    myLimit = doc.data().limit || 0; 
                    document.getElementById('limit').value = myLimit; 
                    render(); 
                }
            });
        } else {
            document.getElementById('auth-section').innerHTML = `
                <div class="auth-options">
                    <button onclick="auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())" class="btn-auth" style="background:#4285f4">دخول بجوجل 🚀</button>
                    <button onclick="loginPhone()" class="btn-auth" style="background:#34b7f1">رقم الهاتف 📱</button>
                </div><div id="recaptcha-container"></div>`;
        }
    });

    function loginPhone() {
        let num = prompt("رقمك بـ +20:");
        if(!num) return;
        const verifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {size: 'invisible'});
        auth.signInWithPhoneNumber(num, verifier).then(res => {
            let code = prompt("كود الـ SMS:");
            return res.confirm(code);
        }).catch(err => alert("خطأ: " + err.message));
    }

    function render() {
        const hist = document.getElementById('historyList');
        hist.innerHTML = ''; let total = 0;
        list.forEach(x => { total += x.a; hist.innerHTML = `<div class="item"><span>${x.c}</span><b>${x.a} ج.م</b></div>` + hist.innerHTML; });
        const rem = myLimit - total;
        document.getElementById('rem').innerText = rem + ' EGP';
        document.getElementById('rem').style.color = rem < 0 ? "#ef4444" : "#10b981";
    }

    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        const c = document.getElementById('itemSelect').value;
        const a = parseFloat(document.getElementById('price').value);
        if(c && a) { list.push({c, a}); render(); saveData(); document.getElementById('price').value = ''; }
    };

    function updateLimit(v) { myLimit = parseFloat(v) || 0; render(); saveData(); }
    function saveData() { if(currentUser) db.collection("users").doc(currentUser.uid).set({expenses: list, limit: myLimit}); }
    
    function toggleTheme() { 
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('theme-text').innerText = isDark ? "تغيير للوضع الليلي 🌙" : "تغيير للوضع النهاري ☀️";
    }

    function clearAll() { if(confirm("أكيد هتمسح السجل؟")) { list = []; render(); saveData(); } }

    function searchMenu() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let options = document.getElementById("itemSelect").options;
        for (let i = 0; i < options.length; i++) {
            options[i].style.display = options[i].text.toUpperCase().indexOf(input) > -1 ? "" : "none";
        }
    }
</script>
</body>
</html>
