<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monito - مونيتو</title>
    <style>
        :root { 
            --bg: #f4f7fe; 
            --card-bg: #ffffff; 
            --text-main: #1a202c; 
            --accent: #3b82f6; 
            --secondary: #10b981;
            --danger: #ef4444;
        }
        [data-theme="dark"] { 
            --bg: #1a202c; 
            --card-bg: #2d3748; 
            --text-main: #f7fafc; 
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            margin: 0; padding: 20px; transition: 0.3s; 
        }

        .card { 
            max-width: 450px; margin: auto; background: var(--card-bg); 
            padding: 30px; border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            text-align: center; border: 1px solid rgba(0,0,0,0.05);
        }

        h1 { 
            font-size: 32px; color: var(--accent); margin-bottom: 2px; 
            font-weight: 800; letter-spacing: -1px;
        }

        .theme-btn { 
            background: rgba(59, 130, 246, 0.1); border: 1px solid var(--accent); 
            color: var(--accent); padding: 6px 16px; border-radius: 20px; 
            cursor: pointer; font-size: 13px; margin: 10px auto 20px auto;
            display: inline-block; transition: 0.2s;
        }
        .theme-btn:hover { background: var(--accent); color: white; }

        .budget-container {
            background: var(--bg);
            border: 2px dashed var(--accent);
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
        }

        #rem { font-size: 38px; font-weight: 900; color: var(--secondary); display: block; margin-bottom: 10px; }

        .limit-input {
            width: 80%; padding: 10px; border: 1px solid var(--accent);
            border-radius: 12px; text-align: center; font-size: 16px;
            background: var(--card-bg); color: var(--text-main);
        }

        input, select { 
            width: 100%; padding: 14px; margin: 10px 0; 
            border: 2px solid #e2e8f0; border-radius: 15px; 
            font-size: 16px; outline: none; background: var(--card-bg); 
            color: var(--text-main); box-sizing: border-box;
        }

        .btn { 
            border: none; padding: 15px; border-radius: 15px; 
            font-weight: bold; cursor: pointer; width: 100%; 
            font-size: 18px; transition: 0.2s;
        }

        .btn-add { 
            background: var(--accent); color: white; 
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); margin-top: 10px;
        }

        .btn-clear {
            background: rgba(239, 68, 68, 0.05); color: var(--danger);
            border: 1px solid var(--danger); margin-top: 20px;
            font-size: 14px; padding: 10px;
        }

        .history { margin-top: 25px; text-align: right; max-height: 150px; overflow-y: auto; border-top: 1px solid #eee; }
        .item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.03); }
    </style>
</head>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpwcIgEsaG_lEhC6Yp6nQ__spGj_ZqnYY",
        authDomain: "monito-c4291.firebaseapp.com",
        projectId: "monito-c4291",
        storageBucket: "monito-c4291.appspot.com",
        appId: "1:366796127553:web:a840f751c322000248b5c0"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let list = []; let myLimit = 0; let currentUser = null;

    function toggleTheme() {
        const body = document.documentElement;
        const btnText = document.getElementById('theme-text');
        if(body.getAttribute('data-theme') === 'dark') {
            body.setAttribute('data-theme', 'light');
            btnText.innerHTML = "تغيير للوضع الليلي 🌙";
        } else {
            body.setAttribute('data-theme', 'dark');
            btnText.innerHTML = "تغيير للوضع النهاري ☀️";
        }
    }

    function render() {
        const hist = document.getElementById('historyList');
        const rem = document.getElementById('rem');
        hist.innerHTML = ''; let total = 0;
        list.forEach(x => { total += x.a; hist.innerHTML = `<div class="item"><span>${x.c}</span><b>${x.a} ج.م</b></div>` + hist.innerHTML; });
        const finalRem = myLimit - total;
        rem.innerText = finalRem + ' EGP';
        rem.style.color = finalRem < 0 ? "#e53e3e" : "#38a169";
    }

    function updateLimit(val) { myLimit = parseFloat(val) || 0; render(); saveData(); }
    function saveData() { if(currentUser) db.collection("users").doc(currentUser.uid).set({ expenses: list, limit: myLimit }); }

    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            // هنا التعديل: بيقرأ الاسم الأول من الإيميل
            const firstName = user.displayName ? user.displayName.split(' ')[0] : "مستخدم";
            document.getElementById('auth-section').innerHTML = `<p style="margin:10px 0;">أهلاً ${firstName} 👋 <span onclick="auth.signOut()" style="cursor:pointer; color:red; font-size:11px; margin-right:10px;">(خروج)</span></p>`;
            
            db.collection("users").doc(user.uid).get().then(doc => {
                if (doc.exists) {
                    list = doc.data().expenses || [];
                    myLimit = doc.data().limit || 0;
                    document.getElementById('limit').value = myLimit;
                    render();
                }
            });
        } else {
            document.getElementById('auth-section').innerHTML = `<button onclick="auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())" class="btn btn-add" style="background:#4285f4; margin-bottom:20px;">دخول بجوجل 🚀</button>`;
        }
    });

    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        const c = document.getElementById('itemSelect').value;
        const a = parseFloat(document.getElementById('price').value);
        if(!c || isNaN(a)) return;
        list.push({ c, a }); render(); saveData();
        document.getElementById('price').value = '';
    };

    function clearAll() { if(confirm("أكيد هتمسح السجل؟")) { list = []; render(); saveData(); } }

    function searchMenu() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let options = document.getElementById("itemSelect").options;
        for (let i = 0; i < options.length; i++) {
            let txt = options[i].text;
            options[i].style.display = txt.toUpperCase().indexOf(input) > -1 ? "" : "none";
        }
    }
</script>
</body>
</html>
