<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تطبيق ست الكل للمصاريف</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.3/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // كود تصفير العداد كل أول شهر
    function checkNewMonth() {
        const currentMonth = new Date().getMonth();
        const savedMonth = localStorage.getItem('savedMonth'); 

        if (savedMonth !== null && savedMonth != currentMonth) {
            localStorage.removeItem('expenses'); 
            localStorage.setItem('totalAmount', '0');
            alert("بداية شهر جديد.. تم تصفير المصاريف يا ست الكل! ❤️");
        }
        localStorage.setItem('savedMonth', currentMonth);
    } 
    checkNewMonth();
  </script>
</head>
<body class="bg-gray-100 p-4">
  <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6">
    <h1 class="text-2xl font-bold mb-4 text-center text-blue-600">تطبيق ست الكل للمصاريف ❤️</h1>
    
    <form id="expenseForm" class="mb-4">
      <div>
        <label for="expenseName" class="block text-gray-700 font-bold">نوع المصروف</label>
        <select id="expenseName" class="w-full border rounded p-2 mt-1" required>
          <option value="أكل">أكل 🍔</option>
          <option value="مواصلات">مواصلات 🚗</option>
          <option value="فواتير">فواتير ⚡</option>
          <option value="آخر">آخر 🛍️</option>
        </select>
      </div>
      <div>
        <label for="expenseAmount" class="block text-gray-700 mt-4 font-bold">المبلغ (EGP)</label>
        <input type="number" id="expenseAmount" class="w-full border rounded p-2 mt-1" placeholder="أدخل المبلغ" required>
      </div>
      <button type="submit" class="w-full mt-4 bg-blue-600 text-white rounded p-2 font-bold shadow-md hover:bg-blue-700">إضافة مصروف</button>
    </form>
    
    <div class="mt-4 border-t pt-4 text-lg">
      <strong class="text-gray-800">المجموع الكلي:</strong> <span id="totalAmount" class="text-red-600 font-bold">0</span> EGP
    </div> 

    <table class="mt-4 w-full border-t text-right">
      <thead>
        <tr class="bg-gray-50">
          <th class="p-2 border-b">نوع المصروف</th>
          <th class="p-2 border-b text-center">المبلغ</th>
        </tr>
      </thead>
      <tbody id="expenseTableBody">
        </tbody>
    </table> 

    <div class="mt-6">
        <canvas id="expenseChart"></canvas>
    </div>
  </div> 

  <script>
    const expenseForm = document.getElementById('expenseForm');
    const expenseName = document.getElementById('expenseName');
    const expenseAmount = document.getElementById('expenseAmount');
    const totalAmountElement = document.getElementById('totalAmount');
    const expenseTableBody = document.getElementById('expenseTableBody');
    const expenseChartElement = document.getElementById('expenseChart'); 

    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
    let expenseChart; 

    function renderExpenses() {
      expenseTableBody.innerHTML = '';
      let total = 0;
      let expenseCategories = { 'أكل': 0, 'مواصلات': 0, 'فواتير': 0, 'آخر': 0 }; 

      expenses.forEach(exp => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="p-2 border-b text-right">${exp.name}</td><td class="p-2 border-b text-center font-bold">${exp.amount} EGP</td>`;
        expenseTableBody.appendChild(tr);
        total += parseFloat(exp.amount);
        if (expenseCategories.hasOwnProperty(exp.name)) {
            expenseCategories[exp.name] += exp.amount;
        }
      }); 

      totalAmountElement.textContent = total; 

      const data = {
        labels: ['أكل', 'مواصلات', 'فواتير', 'آخر'],
        datasets: [{
          data: Object.values(expenseCategories),
          backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0']
        }]
      }; 

      if (expenseChart) {
        expenseChart.data = data;
        expenseChart.update();
      } else {
        expenseChart = new Chart(expenseChartElement, {
          type: 'pie',
          data: data,
          options: {
              responsive: true,
              plugins: {
                  legend: { position: 'bottom' }
              }
          }
        });
      }
    } 

    expenseForm.addEventListener('submit', function(event) {
      event.preventDefault();
      const name = expenseName.value;
      const amount = parseFloat(expenseAmount.value);
      
      if (name && !isNaN(amount)) {
        const newExpense = { name, amount };
        expenses.push(newExpense);
        localStorage.setItem('expenses', JSON.stringify(expenses));
        renderExpenses();
        expenseAmount.value = '';
      }
    }); 

    window.addEventListener('load', renderExpenses);
  </script>
</body>
</html>
