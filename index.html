<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monito - مونيتو</title>
    <style>
        :root { 
            --bg: #f8fafc; 
            --card-bg: #ffffff; 
            --text-main: #0f172a; 
            --text-sub: #64748b; 
            --box-bg: #f1f5f9; 
            --border: #e2e8f0; 
            --accent: #2563eb;
        }
        [data-theme="dark"] { 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text-main: #f8fafc; 
            --text-sub: #94a3b8; 
            --box-bg: #334155; 
            --border: #475569; 
            --accent: #38bdf8;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 15px; transition: 0.3s; }
        
        .card { 
            max-width: 500px; margin: auto; background: var(--card-bg); padding: 25px; 
            border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border: 1px solid var(--border); transition: 0.3s;
        }

        h1 { text-align: center; font-size: 24px; margin-bottom: 5px; color: var(--accent); }
        .sub-title { text-align: center; color: var(--text-sub); font-size: 14px; margin-bottom: 25px; }
        
        .budget-box { background: var(--box-bg); padding: 20px; border-radius: 18px; text-align: center; margin-bottom: 20px; }
        #rem { font-size: 32px; font-weight: bold; margin-bottom: 10px; }

        .switch-container { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 14px; }
        .switch { position: relative; display: inline-block; width: 46px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }

        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; background: var(--card-bg); color: var(--text-main); }
        .add-btn { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .add-btn:active { transform: scale(0.98); }

        .history { margin-top: 20px; max-height: 200px; overflow-y: auto; }
        .item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); font-size: 15px; }
    </style>
</head>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpwcIgEsaG_lEhC6Yp6nQ__spGj_ZqnYY",
        authDomain: "monito-c4291.firebaseapp.com",
        projectId: "monito-c4291",
        storageBucket: "monito-c4291.appspot.com",
        appId: "1:366796127553:web:a840f751c322000248b5c0"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let list = []; let myLimit = 0; let currentUser = null;

    document.getElementById('dark-mode-toggle').addEventListener('change', (e) => {
        document.documentElement.setAttribute('data-theme', e.target.checked ? 'dark' : 'light');
    });

    function render() {
        const hist = document.getElementById('historyList');
        const rem = document.getElementById('rem');
        hist.innerHTML = ''; let total = 0;
        list.forEach(x => { total += x.a; hist.innerHTML = `<div class="item"><span>${x.c}</span><b>${x.a} ج.م</b></div>` + hist.innerHTML; });
        const finalRem = myLimit - total;
        rem.innerText = finalRem + ' EGP';
        rem.style.color = finalRem < 0 ? "#ef4444" : "#22c55e";
    }

    function updateLimit(val) { myLimit = parseFloat(val) || 0; render(); saveData(); }
    function saveData() { if(currentUser) db.collection("users").doc(currentUser.uid).set({ expenses: list, limit: myLimit }); }

    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-section').innerHTML = `<span>أهلاً يوسف 👋</span> <button onclick="auth.signOut()" style="width:auto; padding:5px; font-size:10px;">خروج</button>`;
            db.collection("users").doc(user.uid).get().then(doc => {
                if (doc.exists) {
                    list = doc.data().expenses || [];
                    myLimit = doc.data().limit || 0;
                    document.getElementById('limit').value = myLimit;
                    render();
                }
            });
        } else {
            document.getElementById('auth-section').innerHTML = `<button onclick="auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())" style="width:auto;">دخول بجوجل 🚀</button>`;
        }
    });

    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        const c = document.getElementById('itemSelect').value;
        const a = parseFloat(document.getElementById('price').value);
        if(!c || isNaN(a)) return;
        list.push({ c, a }); render(); saveData();
        document.getElementById('price').value = '';
    };

    function clearAll() { if(confirm("مسح السجل؟")) { list = []; render(); saveData(); } }

    function searchMenu() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let options = document.getElementById("itemSelect").options;
        for (let i = 0; i < options.length; i++) {
            let txt = options[i].text;
            options[i].style.display = txt.toUpperCase().indexOf(input) > -1 ? "" : "none";
        }
    }
</script>
</body>
</html>
