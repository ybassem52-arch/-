<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تطبيق ميزانية ماما</title>
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ميزانية ماما">
  <meta name="theme-color" content="#2563eb">

  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.3/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
    .card { background: white; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="max-w-md mx-auto p-4">
    <div class="card p-6 shadow-lg border-t-4 border-blue-500">
      <h1 class="text-2xl font-bold mb-4 text-center text-blue-600">تطبيق ست الكل ❤️</h1>
      
      <div class="mb-4 p-3 bg-blue-50 rounded-lg text-center">
          <span class="text-xs text-gray-500">الميزانية المتبقية</span>
          <div class="text-xl font-bold text-green-600" id="remDisplay">0 EGP</div>
          <input type="number" id="bLimit" class="w-20 text-center text-xs border-b border-blue-200 bg-transparent outline-none" placeholder="حددي المبلغ">
      </div>

      <form id="expForm" class="space-y-3">
        <select id="eName" class="w-full border rounded-lg p-2 bg-gray-50 outline-none">
          <option value="أكل">أكل 🍔</option>
          <option value="مواصلات">مواصلات 🚗</option>
          <option value="فواتير">فواتير ⚡</option>
          <option value="آخر">أخرى 🛍️</option>
        </select>
        <input type="number" id="eAmount" class="w-full border rounded-lg p-2 outline-none" placeholder="المبلغ المطلوب" required>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow-md active:bg-blue-800">إضافة ➕</button>
      </form>
      
      <div class="mt-6 flex justify-between items-center border-t pt-4">
        <div class="text-sm font-bold">المجموع: <span id="totalOut" class="text-red-500">0</span></div>
        <button onclick="delAll()" class="text-xs text-gray-400 underline">تصفير السجل 🧹</button>
      </div>

      <canvas id="myChart" class="mt-4" height="200"></canvas>

      <div class="mt-6">
        <h2 class="text-sm font-bold text-gray-600 mb-2 italic">آخر المصاريف:</h2>
        <div id="list" class="space-y-2 max-h-40 overflow-y-auto"></div>
      </div>
    </div>
  </div>

  <script>
    // كود الحفظ الأوفلاين المطور
    let exps = JSON.parse(localStorage.getItem('exps')) || [];
    let limit = localStorage.getItem('limit') || 0;
    let chart;

    function update() {
      const list = document.getElementById('list');
      const totalOut = document.getElementById('totalOut');
      const remDisplay = document.getElementById('remDisplay');
      
      list.innerHTML = '';
      let total = 0;
      let cats = { 'أكل': 0, 'مواصلات': 0, 'فواتير': 0, 'آخر': 0 };

      exps.slice().reverse().forEach(item => {
        total += item.amount;
        cats[item.name] += item.amount;
        list.innerHTML += `<div class="flex justify-between text-sm border-b pb-1"><span>${item.name} (${item.time})</span><span class="font-bold">${item.amount}</span></div>`;
      });

      totalOut.innerText = total;
      remDisplay.innerText = (limit - total) + ' EGP';
      localStorage.setItem('exps', JSON.stringify(exps));
      
      draw(Object.values(cats));
    }

    function draw(dataValues) {
      const ctx = document.getElementById('myChart').getContext('2d');
      if (chart) chart.destroy();
      chart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: ['أكل', 'مواصلات', 'فواتير', 'أخرى'], datasets: [{ data: dataValues, backgroundColor: ['#ef4444', '#3b82f6', '#f59e0b', '#10b981'] }] },
        options: { plugins: { legend: { display: false } } }
      });
    }

    document.getElementById('expForm').onsubmit = (e) => {
      e.preventDefault();
      exps.push({
        name: document.getElementById('eName').value,
        amount: parseFloat(document.getElementById('eAmount').value),
        time: new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})
      });
      document.getElementById('eAmount').value = '';
      update();
    };

    document.getElementById('bLimit').oninput = (e) => {
      limit = e.target.value;
      localStorage.setItem('limit', limit);
      update();
    };

    function delAll() { if(confirm("تمسحي السجل؟")) { exps = []; update(); } }
    
    // تحميل البيانات عند البداية
    document.getElementById('bLimit').value = limit;
    update();

    // كود الـ Service Worker البسيط جداً للإصدار ده
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('https://cdn.jsdelivr.net/npm/workbox-sw@6.5.4/build/workbox-sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
